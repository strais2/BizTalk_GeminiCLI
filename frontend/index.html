<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업무 말투 변환기 - BizTalk Gemini-CLI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💼 업무 말투 변환기</h1>
            <p>일상적인 말투를 상황에 맞는 비즈니스 어투로 바꿔드립니다.</p>
        </header>

        <main>
            <section class="input-section">
                <label for="inputText">변환할 내용</label>
                <textarea id="inputText" placeholder="예: 내일까지 보고서 제출 어려울 것 같음" rows="5"></textarea>
            </section>

            <section class="target-section">
                <label>수신 대상 선택</label>
                <div class="button-group">
                    <button class="target-btn" data-target="boss">상사 / 임원</button>
                    <button class="target-btn" data-target="colleague">타팀 동료</button>
                    <button class="target-btn" data-target="client">고객 / 외부</button>
                    <button class="target-btn active" data-target="team">팀 내 동료</button>
                </div>
            </section>

            <div class="action-section">
                <button id="convertBtn" onclick="convertTone()">🚀 변환하기</button>
            </div>

            <section class="output-section" id="outputContainer" style="display: none;">
                <label for="outputText">변환 결과</label>
                <div class="textarea-wrapper">
                    <textarea id="outputText" readonly rows="5"></textarea>
                    <button id="copyBtn" class="copy-btn" onclick="copyToClipboard()">📋 복사하기</button>
                </div>
            </section>

            <div id="loader" class="loader-container" style="display: none;">
                <div class="spinner"></div>
                <p>AI가 정중하게 변환 중입니다...</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 BizTalk Gemini-CLI. Powered by Upstage Solar-Pro3</p>
        </footer>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
